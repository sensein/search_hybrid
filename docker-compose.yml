version: '3.8'

services:
  # BioPortal Concept Mapping API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bioportal-concept-mapping
    ports:
      - "8000:8000"
    volumes:
      # Mount database
      - ./bioportal.db:/app/bioportal.db:ro
      # Mount cache for model persistence
      - ./cache:/app/.cache
    environment:
      # Cache Env 
      - BM25_CACHE_DIR=${BM25_CACHE_DIR}
      - INDEX_CACHE_DIR=${INDEX_CACHE_DIR}
      - EMBED_CACHE_DIR=${EMBED_CACHE_DIR}

      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
      
      # Retrieval Configuration
      - BM25_WEIGHT=0.3
      - DENSE_WEIGHT=0.7
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      
      # Re-ranking Configuration
      - RERANKER_TYPE=ensemble
      - CROSS_ENCODER_WEIGHT=0.5
      - LATE_INTERACTION_WEIGHT=0.3
      - BIOMEDICAL_WEIGHT=0.2
      
      # Performance
      - MAX_CANDIDATES=20
      - MAX_RESULTS=5
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cache:
    driver: local

networks:
  default:
    name: bioportal-network
